<style>
  :root{
    --bg-void:#08080a; --bg-card:#141417; --bg-card-hover:#1b1b1f;
    --line:#2a2a30; --green:#39ff88; --green-dim:#1c8a4d;
    --gold:#c9a227; --red:#ff3b3b; --text:#ececee; --text-dim:#8d8d96;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(ellipse 900px 500px at 50% -10%, rgba(57,255,136,0.08), transparent 60%), var(--bg-void);
    color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; padding-bottom:60px;
  }
  .eyebrow{text-align:center; font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:0.35em; font-size:12px; color:var(--gold); padding-top:36px; text-transform:uppercase;}
  h1.title{
    text-align:center; font-family:'Bebas Neue',sans-serif; font-size:min(20vw, 108px); letter-spacing:0.04em; margin:4px 0 0 0; color:#eafff2;
    text-shadow:0 0 6px rgba(57,255,136,0.9), 0 0 22px rgba(57,255,136,0.55), 0 0 60px rgba(57,255,136,0.35);
    animation:pulseGlow 3.2s ease-in-out infinite;
  }
  @keyframes pulseGlow{0%,100%{text-shadow:0 0 6px rgba(57,255,136,0.9),0 0 22px rgba(57,255,136,0.55),0 0 60px rgba(57,255,136,0.35);} 50%{text-shadow:0 0 10px rgba(57,255,136,1),0 0 34px rgba(57,255,136,0.75),0 0 90px rgba(57,255,136,0.5);}}
  .subtitle{text-align:center; font-family:'Oswald',sans-serif; font-weight:500; letter-spacing:0.2em; font-size:13px; color:var(--text-dim); margin-top:-6px; text-transform:uppercase;}
  .meta{text-align:center; font-size:13px; color:var(--text-dim); margin-top:10px;}
  .meta b{color:var(--text);}

  .rope{display:flex; align-items:center; gap:10px; max-width:920px; margin:30px auto; padding:0 20px;}
  .rope::before,.rope::after{content:""; flex:1; height:2px; background:repeating-linear-gradient(90deg, var(--line) 0 8px, transparent 8px 14px);}
  .rope span{font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:0.3em; color:var(--text-dim); text-transform:uppercase; white-space:nowrap;}

  .wrap{max-width:920px; margin:0 auto; padding:0 20px;}

  .lockbar{display:flex; justify-content:flex-end; max-width:920px; margin:0 auto; padding:14px 20px 0 20px;}
  .lock-btn{background:none; border:1px solid var(--line); color:var(--text-dim); font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; padding:7px 12px; border-radius:20px; cursor:pointer; display:flex; align-items:center; gap:6px;}
  .lock-btn:hover{border-color:var(--gold); color:var(--gold);}
  .lock-btn.active{border-color:var(--green); color:var(--green);}

  .live-banner{
    max-width:920px; margin:20px auto 0 auto; padding:12px 20px; text-align:center;
    font-family:'Oswald',sans-serif; letter-spacing:0.15em; text-transform:uppercase; font-size:13px;
    background:rgba(255,59,59,0.08); border:1px solid rgba(255,59,59,0.4); border-radius:8px; color:var(--red);
  }
  .live-banner b{color:#fff;}

  .phase-tabs{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:26px auto 8px auto; max-width:920px; padding:0 20px;}
  .phase-tab{
    background:var(--bg-card); border:1px solid var(--line); color:var(--text-dim);
    font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:0.08em; text-transform:uppercase;
    padding:10px 16px; border-radius:8px; cursor:pointer; text-align:center; flex:1; min-width:130px;
  }
  .phase-tab .ph-name{display:block; font-size:13px; font-weight:600;}
  .phase-tab .ph-sub{display:block; font-size:10px; color:var(--text-dim); margin-top:2px; letter-spacing:0.04em;}
  .phase-tab.on{border-color:var(--green); color:var(--green); background:rgba(57,255,136,0.06);}
  .phase-tab.is-live{border-color:var(--red);}
  .phase-tab.is-live .ph-name::before{content:"● "; color:var(--red);}

  .sport-group-title{
    font-family:'Oswald',sans-serif; letter-spacing:0.2em; text-transform:uppercase; font-size:12px;
    color:var(--gold); margin:22px 0 10px 4px;
  }

  .match{position:relative; background:var(--bg-card); border:1px solid var(--line); border-radius:10px; padding:16px 18px; margin-bottom:12px;}
  .match.completed{border-color:rgba(201,162,39,0.55);}
  .match.live{border-color:var(--red); box-shadow:0 0 0 1px rgba(255,59,59,0.25), 0 0 24px rgba(255,59,59,0.12);}
  .match-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:6px;}
  .match-order{font-family:'Oswald',sans-serif; font-size:11px; color:var(--text-dim); letter-spacing:0.1em;}
  .badges{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .tag{font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; padding:3px 9px; border-radius:12px; border:1px solid var(--line); color:var(--text-dim);}
  .status-badge{font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; padding:4px 10px; border-radius:12px;}
  .status-upcoming{background:rgba(141,141,150,0.15); color:var(--text-dim);}
  .status-live{background:rgba(255,59,59,0.15); color:var(--red);}
  .status-live::before{content:"● "; animation:blink 1.1s infinite;}
  @keyframes blink{50%{opacity:0.25;}}
  .status-completed{background:rgba(201,162,39,0.15); color:var(--gold);}

  .fighters{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:14px;}
  .fighter{text-align:center;}
  .fighter.win .fname{color:var(--gold);}
  .fighter.win .fname::after{content:" 🏆"; font-size:13px;}
  .fname{font-family:'Oswald',sans-serif; font-weight:600; font-size:16px; text-transform:uppercase;}
  .fteam{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .vs{font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--text-dim);}
  .result-line{text-align:center; margin-top:10px; font-size:12px; color:var(--gold); letter-spacing:0.03em;}
  .note{text-align:center; margin-top:6px; font-size:12px; color:var(--text-dim); font-style:italic;}
  .note.warn{color:#ffb020;}

  .empty{text-align:center; color:var(--text-dim); padding:40px 20px; font-family:'Oswald',sans-serif; letter-spacing:0.1em; text-transform:uppercase; font-size:13px;}

  .panel{background:var(--bg-card); border:1px solid var(--green-dim); border-radius:10px; padding:18px; margin-bottom:22px;}
  .panel h3{margin:0 0 12px 0; font-family:'Oswald',sans-serif; letter-spacing:0.15em; text-transform:uppercase; font-size:13px; color:var(--green);}
  .pin-row{display:flex; gap:8px;}
  input,select,textarea{background:#0e0e11; border:1px solid var(--line); color:var(--text); border-radius:6px; padding:9px 10px; font-family:'Barlow',sans-serif; font-size:14px; width:100%;}
  input:focus,select:focus,textarea:focus{outline:1px solid var(--green); border-color:var(--green);}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
  .field{margin-bottom:8px;}
  .field label{display:block; font-size:11px; color:var(--text-dim); margin-bottom:4px; font-family:'Oswald',sans-serif; letter-spacing:0.08em; text-transform:uppercase;}
  .btn{font-family:'Oswald',sans-serif; letter-spacing:0.1em; text-transform:uppercase; font-size:12px; padding:9px 16px; border-radius:6px; border:none; cursor:pointer;}
  .btn-primary{background:var(--green); color:#08080a; font-weight:600;}
  .btn-primary:hover{background:#5dffa3;}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--text-dim);}
  .btn-ghost:hover{border-color:var(--red); color:var(--red);}
  .btn-small{padding:6px 10px; font-size:11px;}
  .phase-pick{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
  .phase-pick button{flex:1; min-width:100px;}

  .edit-row{border-top:1px solid var(--line); margin-top:12px; padding-top:12px;}
  .edit-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:8px;}
  .edit-header b{font-family:'Oswald',sans-serif; font-size:12px;}

  .qr-block{text-align:center; margin-top:10px;}
  .qr-block img, .qr-block svg{border-radius:10px; border:6px solid #fff; background:#fff; width:180px; height:180px; display:inline-block;}
  .qr-label{font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); margin-top:10px;}
  .link-box{display:inline-block; margin-top:8px; font-size:12px; color:var(--green); word-break:break-all; max-width:400px;}
  .sync-note{text-align:center; font-size:11px; color:var(--text-dim); margin-top:30px; letter-spacing:0.05em;}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--green); color:#08080a; font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; padding:10px 18px; border-radius:20px; opacity:0; pointer-events:none; transition:opacity 0.25s; z-index:50;}
  .toast.show{opacity:1;}
</style>
</head>

// i fogli Google (vedi istruzioni). Finché restano vuoti, la pagina
// mostra i dati di esempio integrati qui sotto, sempre offline-safe.

const CSV_URL_MATCHES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQFYfswgAjrfQmz__AtXVWsGfSHFjz81bE4f5qoi3g4_XJ2B1jsoBDmQnsNocQY9kT35Zj0CbFWMkn/pub?gid=0&single=true&output=csv"; // link CSV del foglio "Matches"
const CSV_URL_CONFIG  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQFYfswgAjrfQmz__AtXVWsGfSHFjz81bE4f5qoi3g4_XJ2B1jsoBDmQnsNocQY9kT35Zj0CbFWMkn/pub?gid=1156585817&single=true&output=csv"; // link CSV del foglio "Config"

const PHASES = {
  mattina:    {label:"Mattina",     sub:"Light Contact Kickboxing"},
  pomeriggio: {label:"Pomeriggio",  sub:"Grappling"},
  preserale:  {label:"Pre-serale",  sub:"MMA Light + Pre-Card Kick"},
  serale:     {label:"Serale",      sub:"Galà Kickboxing & MMA"}
};
const PHASE_LABEL_TO_KEY = {
  'mattina':'mattina', 'pomeriggio':'pomeriggio', 'preserale':'preserale',
  'pre-serale':'preserale', 'serale':'serale'
};

let matches = SEED_MATCHES.slice();
let activePhase = "mattina";
let currentTab = "mattina";

const el = id => document.getElementById(id);

function toast(msg){
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function withTimeout(promise, ms){
  ms = ms || 7000;
  return Promise.race([
    promise,
    new Promise((_, reject)=> setTimeout(()=> reject(new Error('timeout')), ms))
  ]);
}

// ---- Minimal RFC4180 CSV parser (handles quoted fields, commas, "" escaping) ----
function parseCsv(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0; i<text.length; i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const headers = rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.some(v=>v && v.trim())).map(r=>{
    const obj = {};
    headers.forEach((h,idx)=> obj[h] = (r[idx]||'').trim());
    return obj;
  });
}

async function fetchCsv(url){
  if(!url) return null;
  try{
    const res = await withTimeout(fetch(url, {cache:'no-store'}));
    if(!res.ok) return null;
    const text = await res.text();
    return parseCsv(text);
  }catch(e){ return null; }
}

function mapStato(v){
  v = (v||'').toLowerCase();
  if(v.indexOf('live') >= 0) return 'live';
  if(v.indexOf('conclu') >= 0) return 'completed';
  return 'upcoming';
}
function mapVincitore(v, fighterA, fighterB){
  v = (v||'').trim().toLowerCase();
  if(!v) return '';
  if(v === 'rosso' || v === 'a') return 'A';
  if(v === 'blu' || v === 'b') return 'B';
  if(v.indexOf('pareggio') >= 0 || v === 'draw') return 'draw';
  // fallback: they typed the athlete's name directly
  if(fighterA && v === fighterA.trim().toLowerCase()) return 'A';
  if(fighterB && v === fighterB.trim().toLowerCase()) return 'B';
  return '';
}

function rowsToMatches(rows){
  return rows.map((r, idx) => {
    const phaseKey = PHASE_LABEL_TO_KEY[(r.Fase||'').trim().toLowerCase()] || 'mattina';
    return {
      id: 'r' + idx,
      phase: phaseKey,
      sport: r.Sport || '',
      category: r.Categoria || '',
      tipo: r.Tipo || '',
      order: parseInt(r.Ordine) || (idx+1),
      fighterA: r.AtletaRosso || '',
      teamA: r.TeamRosso || '',
      fighterB: r.AtletaBlu || '',
      teamB: r.TeamBlu || '',
      tatami: (r.Tatami||'').trim(),
      status: mapStato(r.Stato),
      winner: mapVincitore(r.Vincitore, r.AtletaRosso, r.AtletaBlu),
      method: r.Metodo || '',
      round: r.Round || '',
      note: r.Nota || ''
    };
  });
}

async function loadAll(force){
  const [matchRows, configRows] = await Promise.all([
    fetchCsv(CSV_URL_MATCHES),
    fetchCsv(CSV_URL_CONFIG)
  ]);

  let newMatches = matches, newPhase = activePhase;
  if(matchRows && matchRows.length){
    newMatches = rowsToMatches(matchRows);
  }
  if(configRows && configRows.length){
    const row = configRows.find(r => (r.Chiave||'').trim().toLowerCase() === 'faseattiva');
    if(row){
      const key = PHASE_LABEL_TO_KEY[(row.Valore||'').trim().toLowerCase()];
      if(key) newPhase = key;
    }
  }

  let changed = force;
  try{ changed = changed || JSON.stringify(newMatches) !== JSON.stringify(matches) || newPhase !== activePhase; }
  catch(e){ changed = true; }

  matches = newMatches;
  activePhase = newPhase;
  if(changed) render();
}

function showShareLink(url){
  el('linkBox').textContent = url;
}

function render(){
  try{
    renderLiveBanner();
    renderPhaseTabs();
    renderRopeLabel();
    renderList();
  }catch(err){
    console.error('Errore di rendering:', err);
  }
}

function renderLiveBanner(){
  const info = PHASES[activePhase];
  el('liveBanner').innerHTML = `IN CORSO ORA — <b>${info.label}</b> · ${info.sub}`;
}

function renderPhaseTabs(){
  el('phaseTabs').innerHTML = Object.keys(PHASES).map(key=>{
    const info = PHASES[key];
    const isLive = key === activePhase ? 'is-live' : '';
    const on = key === currentTab ? 'on' : '';
    return `<button class="phase-tab ${on} ${isLive}" data-phase="${key}">
      <span class="ph-name">${info.label}</span>
      <span class="ph-sub">${info.sub}</span>
    </button>`;
  }).join('');
  el('phaseTabs').querySelectorAll('.phase-tab').forEach(b=>{
    b.onclick = ()=>{ currentTab = b.dataset.phase; render(); };
  });
}

function renderRopeLabel(){
  el('ropeLabel').textContent = PHASES[currentTab].label + " — Match Card";
}

function methodLabel(m){ return m || "—"; }

function renderList(){
  const list = matches.filter(m => m.phase === currentTab).sort((a,b)=>(a.order||0)-(b.order||0));

  if(list.length === 0){
    el('matchList').innerHTML = `<div class="empty">Nessun incontro ancora pubblicato per questa fase</div>`;
    return;
  }

  if(currentTab === 'serale'){
    el('matchList').innerHTML = list.map(m=>renderMatchCard(m, true)).join('');
    return;
  }

  // Mattina: raggruppa per Tatami (se la colonna è compilata), non per sport
  if(currentTab === 'mattina'){
    const hasTatami = list.some(m => m.tatami);
    if(hasTatami){
      const groups = [];
      const seen = {};
      list.forEach(m=>{
        const key = m.tatami || 'Altri incontri';
        if(!seen[key]){ seen[key]=true; groups.push(key); }
      });
      let html = '';
      groups.forEach(tat=>{
        html += `<div class="sport-group-title">Tatami ${tat}</div>`;
        list.filter(m=>(m.tatami || 'Altri incontri')===tat).forEach(m=>{ html += renderMatchCard(m, false); });
      });
      el('matchList').innerHTML = html;
      return;
    }
    // nessuna colonna Tatami compilata: elenco unico come prima
    el('matchList').innerHTML = list.map(m=>renderMatchCard(m, false)).join('');
    return;
  }

  const groups = [];
  const seen = {};
  list.forEach(m=>{ if(!seen[m.sport]){ seen[m.sport]=true; groups.push(m.sport); } });

  let html = '';
  const multiGroup = groups.length > 1;
  groups.forEach(sport=>{
    if(multiGroup) html += `<div class="sport-group-title">${sport}</div>`;
    list.filter(m=>m.sport===sport).forEach(m=>{ html += renderMatchCard(m, false); });
  });
  el('matchList').innerHTML = html;
}

function renderMatchCard(m, showSportTag){
  const winA = m.winner === 'A' ? 'win' : '';
  const winB = m.winner === 'B' ? 'win' : '';
  const status = m.status || 'upcoming';
  const statusClass = status === 'live' ? 'status-live' : status === 'completed' ? 'status-completed' : 'status-upcoming';
  const statusText = status === 'live' ? 'Live' : status === 'completed' ? 'Concluso' : 'In programma';
  let resultLine = '';
  if(status === 'completed'){
    const winnerName = m.winner==='A' ? m.fighterA : m.winner==='B' ? m.fighterB : 'Pareggio';
    resultLine = `<div class="result-line">Vince ${winnerName}${m.method ? ' — '+methodLabel(m.method) : ''}${m.round ? ' · Round '+m.round : ''}</div>`;
  }
  const noteClass = m.note && m.note.indexOf('⚠️') === 0 ? 'note warn' : 'note';
  return `
    <div class="match ${status}">
      <div class="match-top">
        <div class="match-order">INCONTRO ${m.order || '-'}</div>
        <div class="badges">
          ${showSportTag ? `<span class="tag" style="color:var(--green); border-color:var(--green-dim);">${m.sport}</span>` : ''}
          ${m.category ? `<span class="tag">${m.category}</span>` : ''}
          ${m.tipo ? `<span class="tag">${m.tipo}</span>` : ''}
          <span class="status-badge ${statusClass}">${statusText}</span>
        </div>
      </div>
      <div class="fighters">
        <div class="fighter ${winA}">
          <div class="fname">${m.fighterA || '—'}</div>
          <div class="fteam">${m.teamA || ''}</div>
        </div>
        <div class="vs">VS</div>
        <div class="fighter ${winB}">
          <div class="fname">${m.fighterB || '—'}</div>
          <div class="fteam">${m.teamB || ''}</div>
        </div>
      </div>
      ${resultLine}
      ${m.note ? `<div class="${noteClass}">${m.note}</div>` : ''}
    </div>`;
}

el('refreshBtn').addEventListener('click', async ()=>{
  el('refreshBtn').textContent = '⏳ Aggiornamento...';
  el('refreshBtn').disabled = true;
  try{
    await loadAll(true);
    toast("Dati aggiornati");
  }catch(e){
    toast("Aggiornamento non riuscito, riprova");
  }finally{
    el('refreshBtn').textContent = '🔄 Aggiorna risultati';
    el('refreshBtn').disabled = false;
  }
});

window.addEventListener('error', function(e){ console.error('Errore intercettato:', e.error || e.message); });
window.addEventListener('unhandledrejection', function(e){ console.error('Promise non gestita:', e.reason); e.preventDefault(); });

render(); // show built-in data immediately
showShareLink(window.location.href);

try{ loadAll(); }catch(e){ console.error(e); }
setInterval(()=>{ loadAll(); }, 5000); // safe: read-only, GET requests, timeout-protected
</script>
